stages:
    - check

workflow:
    rules:
        -   if: $CI_COMMIT_BRANCH == "main"
        -   if: $CI_PIPELINE_SOURCE == "merge_request_event"

php:
    stage: check
    image: php:8.4-cli
    before_script:
        - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
        - composer install --no-interaction --prefer-dist
    cache:
        key:
            files:
                - composer.lock
        paths:
            - vendor/
    script:
        - composer run lint
        - composer run format

node:
    stage: check
    image: node:25.8.2
    before_script:
        - npm install -g pnpm@10.6.5
        - pnpm install --frozen-lockfile
    cache:
        key:
            files:
                - pnpm-lock.yaml
        paths:
            - node_modules/
    script:
        - pnpm run lint
        - pnpm run format
